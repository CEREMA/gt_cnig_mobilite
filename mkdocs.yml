site_name: GT CNIG Données de Mobilité
site_url: https://cerema.github.io/gt_cnig_mobilite/
site_description: liste de propositions d'action autour des données de mobilité
site_author: Cerema

# Repository
repo_name: CEREMA/gt_cnig_mobilite
repo_url: https://github.com/CEREMA/gt_cnig_mobilite
edit_uri: edit/main/docs/

# Copyright
# copyright: Copyright &copy; 2025 Cerema - Licence Ouverte 2.0

# Configuration du thème
theme:
  name: material
  language: fr
  features:
    - navigation.sections
    - navigation.expand
    - toc.follow
    
# Extensions Markdown
markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - pymdownx.magiclink
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  
  # Python Markdown Extensions
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Plugins
plugins:
  - search:
      lang: fr
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  - tags:
      tags_file: tags.md

# CSS et JavaScript personnalisés
extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

# Extra
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/CEREMA/mobscidat
      name: GitHub
  
  # Bannière d'annonce (version de travail)
  announce:
    text: "🚧 VERSION DE TRAVAIL - Le site évolue régulièrement. Vos contributions sont bienvenues !"
  
  # Analytics (à activer si nécessaire)
  # analytics:
  #   provider: google
  #   property: G-XXXXXXXXXX

